name: Validate FAQ Knowledge

on:
  pull_request:
    paths:
      - "knowledge/**"
      - "scripts/validate_faq.py"
  push:
    branches:
      - master
    paths:
      - "knowledge/**"
      - "scripts/validate_faq.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Knowledge Base
        run: python3 scripts/validate_faq.py knowledge/
