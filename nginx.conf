events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json;

    server {
        listen 8080;
        server_name _;

        # Proxy agent API endpoints to Python on port 8081
        location /invocations {
            proxy_pass         http://127.0.0.1:8081;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass       http://127.0.0.1:8081;
            proxy_set_header Host $host;
        }

        # Static assets with hash (JS, CSS, images) - cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            root       /var/www/html;
            expires    1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html - no cache to always get latest references
        location = /index.html {
            root       /var/www/html;
            expires    -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Knowledge JSON files — serve statically
        location ~ ^/knowledge/.+\.json$ {
            root       /var/www/html;
            try_files  $uri =404;
            add_header Cache-Control "public, max-age=300";
        }

        # Knowledge Browser SPA routes — must not serve the /knowledge/ directory
        location = /knowledge {
            root       /var/www/html;
            try_files  /index.html =404;
        }

        location = /knowledge/ {
            root       /var/www/html;
            try_files  /index.html =404;
        }

        location /knowledge/ {
            root       /var/www/html;
            try_files  /index.html =404;
        }

        # Serve React SPA — all other routes fall back to index.html
        location / {
            root       /var/www/html;
            try_files  $uri $uri/ /index.html;
        }
    }
}
